x-common-env: &common-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_USER: payments
  POSTGRES_PASSWORD: payments_secret
  POSTGRES_DB: payments
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: 5672
  RABBITMQ_USER: payments
  RABBITMQ_PASSWORD: payments_secret
  RABBITMQ_VHOST: /
  API_KEY: dev_secret_key_change_in_production
  LOG_LEVEL: INFO
  ENVIRONMENT: development
  OUTBOX_POLL_INTERVAL: "1.0"
  GATEWAY_SUCCESS_RATE: "0.9"
  GATEWAY_MIN_DELAY: "2.0"
  GATEWAY_MAX_DELAY: "5.0"
  WEBHOOK_RETRY_ATTEMPTS: "3"
  WEBHOOK_RETRY_BACKOFF: "2.0"
  CONSUMER_RETRY_ATTEMPTS: "3"
  CONSUMER_RETRY_BACKOFF: "2.0"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payments
      POSTGRES_PASSWORD: payments_secret
      POSTGRES_DB: payments
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payments -d payments"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: payments
      RABBITMQ_DEFAULT_PASS: payments_secret
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit consumer_timeout 300000"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI: http://localhost:15672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: alembic upgrade head
    volumes:
      - .:/app
      - /app/.venv
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      <<: *common-env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: on-failure

  consumer:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: on-failure

volumes:
  postgres_data:
  rabbitmq_data:
